<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';

    /* 🌃 Background Image */
    background: url("https://images.unsplash.com/photo-1494526585095-c41746248156")
                no-repeat center center/cover;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.7);
    width: 100%;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 15px;
    text-align: center;

    backdrop-filter: blur(15px);

    box-shadow: 0 0 20px #00c6ff;

    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    color: white;
    margin-bottom: 20px;
}

/* Inputs */
input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 220px;
    border-radius: 8px;
    border: none;
}

/* Button */
button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;

    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00c6ff;
}

.link {
    margin-top: 15px;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="overlay">

<div class="card">

<h2>Smart Light Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="goRegister()">New user? Register</div>

</div>

</div>

<script>
function login() {
    fetch("/api/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(res => res.json())
    .then(valid => {
        if(valid){
            localStorage.setItem("loggedIn", "true");
            window.location.href = "/";
        } else {
            alert("Invalid credentials ❌");
        }
    });
}

function goRegister(){
    window.location.href="register.html";
}
</script>

</body>
</html>
